name: Deploy CitNow Backend to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: citnow-backend
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile.aws backend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION
        script: |
          deploy_app() {
            local dir=$1
            if [ -d "$dir" ]; then
              echo "📂 Found directory: $dir. Deploying..."
              cd "$dir"

              # ⚠️ FIX: Force the git remote to point to the correct (new) repository
              git remote set-url origin https://github.com/focushub360/Quality_Lens.git

              # Pull latest code from the correct GitHub repo
              git fetch origin main
              git reset --hard origin/main
              echo "✅ Code updated to latest commit: $(git log -1 --oneline)"

              # Build the React frontend
              if [ -d "frontend" ]; then
                cd frontend
                npm install --silent
                npm run build
                cd ..
                echo "✅ React frontend built successfully"
              fi

              # Login to ECR and rebuild Docker containers
              aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
                docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

              docker compose -f docker-compose.aws.yml pull backend
              docker compose -f docker-compose.aws.yml up -d --build
              echo "✅ Successfully deployed at $dir"
            else
              echo "⚠️ Directory $dir does not exist, skipping."
            fi
          }

          deploy_app "/home/${{ secrets.EC2_USER }}/CIT_NOW"

          echo "✅ All deploy steps completed!"
